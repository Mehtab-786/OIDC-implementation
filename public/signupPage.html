<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Sign Up</title>
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">
      <h2 class="text-2xl font-bold text-center mb-6">Create Account</h2>

      <div
        id="error-message"
        class="bg-red-100 text-red-700 p-4 rounded mb-4 hidden"
      >
        client_id and redirect_uri are required query parameters.
      </div>

      <div
        id="success-message"
        class="bg-green-100 text-green-700 p-4 rounded mb-4 hidden" 
      >
        <h3>Successfully registered. You can now login.</h3>
        <p><strong>Client ID:</strong> <span id="client_id"></span></p>
        <p><strong>Short code:</strong> <span id="short_code"></span></p>
        <p><strong>Redirect URI:</strong> <span id="redirect_uri"></span></p>
        <p><strong>User ID:</strong> <span id="user_id"></span></p>
      </div>

      <form class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">Username</label>
          <input
            type="text"
            placeholder="Enter your username"
            id="username"
            name="username"
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
          />
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
          />
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Create a password"
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
          />
        </div>

        <button
          class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition"
        >
          Register
        </button>
      </form>

      <p class="text-sm text-center mt-4">
        Already have an account?
        <a id="loginUrl" href="/signin" class="text-green-600 hover:underline"
          >Login</a
        >
      </p>
    </div>

    <script>
      // Extract query parameters
      const urlParams = new URLSearchParams(window.location.search);
      const clientId = urlParams.get("client_id");
      const redirecturi = urlParams.get("redirect_uri");

      if (!clientId || !redirecturi) {
        document.getElementById("error-message").classList.remove("hidden");
        document.querySelector("form").classList.add("hidden");
      }
      document.querySelector("#loginUrl").href =
        `/authorize?client_id=${encodeURIComponent(clientId)}&redirect_uri=${encodeURIComponent(redirecturi)}`;

      document.addEventListener("DOMContentLoaded", () => {
        document.querySelector("form").addEventListener("submit", async (e) => {
          e.preventDefault();
          const username = document.getElementById("username").value;
          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;

          const response = await fetch("/register", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ username, email, password, client_id: clientId, redirect_uri: redirecturi })
          });

          const result = await response.json();
          if (result.success) {
            document.getElementById("success-message").classList.remove("hidden");
            document.getElementById("client_id").textContent = result.data.client_id;
            document.getElementById("short_code").textContent = result.data.code;
            document.getElementById("redirect_uri").textContent = result.data.redirect_uri;
            document.getElementById("user_id").textContent = result.data.userId;
          }else {
            document.getElementById("error-message").classList.remove("hidden");
          }
          
        });
      });
    </script>
  </body>
</html>
