<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Client Registration</title>
  </head>

  <body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-lg">
      <!-- Title -->
      <h2 id="form-title" class="text-2xl font-bold text-center mb-6">
        Register Your Application
      </h2>

      <div class="hidden" id="result-section">
        <h3 class="text-xl font-semibold text-green-700 mb-4 text-center">
          Client Registered Successfully 🎉
        </h3>
        <div class="space-y-3 text-sm">
          <div>
            <span class="font-medium">Client ID:</span>
            <div class="bg-gray-100 p-2 rounded break-all" id="result-data-client-id"></div>
          </div>

          <div>
            <span class="font-medium">Client Secret:</span>
            <div class="bg-gray-100 p-2 rounded break-all" id="result-data-client-secret"></div>
          </div>
        </div>
      </div>

      <!-- Form -->
      <form class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">Application Name</label>
          <input
            name="app_name"
            id="app_name"
            type="text"
            placeholder="My App"
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Application URL</label>
          <input
            name="app_url"
            id="app_url"
            type="url"
            placeholder="https://myapp.com"
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Redirect URI</label>
          <input
            name="redirect_uri"
            id="redirect_uri"
            type="url"
            placeholder="https://myapp.com/callback"
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Contact Email</label>
          <input
            name="contact_email"
            id="contact_email"
            type="email"
            placeholder="you@example.com"
            class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
        </div>

        <button
          class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition"
        >
          Register Client
        </button>
      </form>

      <p class="text-xs text-gray-500 mt-4 text-center">
        After registration, you'll receive a Client ID and Secret.
      </p>
    </div>

    <!-- Script -->
    <script>
      document
        .querySelector("form")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const appName = document.getElementById("app_name")?.value;
          const appUrl = document.getElementById("app_url")?.value;
          const redirectUri = document.getElementById("redirect_uri")?.value;
          const contactEmail = document.getElementById("contact_email")?.value;

          if (!appName || !appUrl || !redirectUri || !contactEmail) {
            alert("Please fill in all fields.");
            return;
          }

          let response = await fetch("/client-registration", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              app_name: appName,
              app_url: appUrl,
              redirect_uri: redirectUri,
              contact_email: contactEmail,
            }),
          });

          let result = await response.json();

          if (result.success) {
            document.getElementById("result-data-client-id").textContent =
              result.data.client_id;
            document.getElementById("result-data-client-secret").textContent =
              result.data.client_secret;
            document.getElementById("result-section").classList.remove("hidden");
        }else {
            alert("Registration failed: " + result.message);
            document.getElementById("result-data-client-id").textContent ="";
            document.getElementById("result-data-client-secret").textContent ="";
            document.getElementById("result-section").classList.add("hidden");
          }
        });
    </script>
  </body>
</html>
